name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      build_id:
        required: true
        type: string
      zip_url:
        required: true
        type: string
      app_name:
        required: true
        type: string
      app_version:
        required: true
        type: string
      webhook_url:
        required: true
        type: string
      bundle_id:
        required: false
        type: string
        default: 'com.yallexe.app'
      min_os:
        required: false
        type: string
        default: '14'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: setup node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: install capacitor
        run: npm install -g @capacitor/cli

      - name: download project
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          mkdir project && cd project && unzip ../project.zip

      - name: setup capacitor ios
        run: |
          cd project
          npm init -y
          npm install @capacitor/core @capacitor/ios
          npx cap init "${{ github.event.inputs.app_name }}" "${{ github.event.inputs.bundle_id }}" --web-dir .
          npx cap add ios
          npx cap sync ios

      - name: build ipa unsigned
        run: |
          MIN_IOS="${{ github.event.inputs.min_os }}"
          MIN_IOS=$(echo "$MIN_IOS" | grep -o '[0-9]*\(\.[0-9]*\)\?' | head -1)
          MIN_IOS="${MIN_IOS:-14}"
          cd project/ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            IPHONEOS_DEPLOYMENT_TARGET="$MIN_IOS" \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: ios-ipa-${{ github.event.inputs.build_id }}
          path: project/ios/App/build/**/*.ipa

      - name: notify webhook
        if: always()
        run: |
          STATUS="${{ job.status == 'success' && 'done' || 'error' }}"
          curl -X POST "${{ github.event.inputs.webhook_url }}" \
            -H "Content-Type: application/json" \
            -d "{\"build_id\":\"${{ github.event.inputs.build_id }}\",\"platform\":\"ipa\",\"status\":\"${STATUS}\",\"run_id\":\"${{ github.run_id }}\"}"
